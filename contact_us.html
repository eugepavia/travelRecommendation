<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <title>Contact Us</title>
    <link rel='stylesheet' href='./style.css'>
</head>

<body>
    
    <nav>
        <h1>U Travel</h1>
        <ul>
            <li><a href='./travel_recommendation.html' id='home'>Home</a></li>
            <li><a href='./about_us.html' id='about'>About us</a></li>
            <li><a href='./contact_us.html' id='contact'>Contact us</a></li>
        </ul>
    </nav>

    <div class='container'>
        <h1>Contact Us</h1>
        <p>Questions? We are happy to listen!</p>
    </div>

    <div class='container'>
        <div class='contactForm'>

            <div>
                <label for='name'>Name:</label>
                <input type='text' id='name' name='name' required>
            </div>

            <div>
                <label for='email'>Email:</label>
                <input type='email' id='email' name='email' required>
            </div>

            <div>
                <label for='message'>Message:</label>
                <textarea rows='5' id='message' name='message' required>
            </div>

            <button type='submit' onclick="submitContact()">Submit</button>

        </div>
    </div>

    <script src='./travel_recommendation.js'></script>

</body>
</html>
